name: Build ZeroApi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - platform: arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ZeroApi ${{ github.ref_name }}"
          releaseBody: |
            ## ZeroApi ${{ github.ref_name }}

            零登录 · 零云端 · 零 CORS 的轻量 API 调试工具。

            ### 资产说明
            - `*_x64-setup.exe`  NSIS 安装版(推荐)
            - `*_x64-setup.msi`  MSI 安装版
            - `*_x64.exe`  便携版(解压即用)
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload workflow artifacts
        if: matrix.platform == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: zeroapi-windows-x64
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error
